<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="Podcast Sync - Cross-device playback sync">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <title>Podcast Sync</title>
  <link rel="stylesheet" href="/global.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>Podcast Sync</h1>
      <div style="display:flex;align-items:center;gap:0.5rem">
        <button id="add-btn" class="btn-icon" title="Add episodes">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </button>
        <button id="theme-toggle" class="btn-icon" title="Toggle theme">
          <svg id="theme-icon-dark" viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
          <svg id="theme-icon-light" class="hidden" viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 000-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg>
          <svg id="theme-icon-system" class="hidden" viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M20 3H4c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h3l-1 1v2h12v-2l-1-1h3c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 13H4V5h16v11z"/></svg>
        </button>
        <span id="device-badge" class="device-badge"></span>
      </div>
    </header>

    <div id="sidebar-overlay" class="sidebar-overlay hidden"></div>
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h2>Add Episodes</h2>
        <button id="sidebar-close" class="btn-icon">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>

      <div class="sidebar-tabs">
        <button id="sidebar-tab-single" class="sidebar-tab active">Single</button>
        <button id="sidebar-tab-feed" class="sidebar-tab">RSS Feed</button>
      </div>

      <div id="sidebar-single" class="sidebar-content">
        <div class="input-group">
          <input type="text" id="sidebar-episode-title" placeholder="Episode title" class="input">
          <input type="text" id="sidebar-episode-url" placeholder="Audio URL" class="input">
          <input type="number" id="sidebar-episode-duration" placeholder="Duration (sec)" class="input">
        </div>
        <div class="position-selector">
          <button class="position-btn active" data-position="tail">加入清單尾</button>
          <button class="position-btn" data-position="head">加入清單頭</button>
        </div>
        <p id="sidebar-position-hint" class="sidebar-hint">預設加入清單尾</p>
        <button id="sidebar-add-single" class="btn btn-primary">Add Episode</button>
      </div>

      <div id="sidebar-feed" class="sidebar-content hidden">
        <div class="input-group">
          <input type="text" id="sidebar-feed-url" placeholder="RSS Feed URL" class="input">
          <button id="sidebar-fetch-feed" class="btn btn-secondary">取得集數</button>
        </div>
        <div id="sidebar-feed-preview" class="feed-preview hidden">
          <p id="sidebar-feed-status" class="feed-status"></p>
          <div id="sidebar-episode-list" class="feed-episode-list"></div>
          <div class="position-selector">
            <button class="position-btn active" data-position="tail">加入清單尾</button>
            <button class="position-btn" data-position="head">加入清單頭</button>
          </div>
          <p id="sidebar-feed-position-hint" class="sidebar-hint">預設加入清單尾</p>
          <div class="sort-selector">
            <button class="sort-btn active" data-order="asc">舊到新</button>
            <button class="sort-btn" data-order="desc">新到舊</button>
          </div>
          <button id="sidebar-add-feed" class="btn btn-primary">加入所有集數</button>
        </div>
      </div>
    </aside>

    <main class="main">
      <section class="account-section">
        <div id="account-info" class="account-info hidden">
          <button id="share-btn" class="btn btn-icon" title="Share">
            <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
          </button>
        </div>

        <div id="no-account" class="no-account">
          <button id="create-account-btn" class="btn btn-primary">Create New Account</button>
        </div>
      </section>

      <section class="content-section">
        <p id="import-status" class="import-status"></p>
        <div class="episode-list" id="episode-list"></div>
      </section>
    </main>

    <footer class="player-bar">
      <div class="player-episode-info">
        <span class="player-episode-title" id="now-playing-title">Select an episode</span>
        <span class="player-episode-time" id="now-playing-episode">-</span>
      </div>

      <div class="player-controls">
        <button id="prev-btn" class="control-btn" disabled>
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button id="play-btn" class="play-btn">
          <svg viewBox="0 0 24 24" fill="currentColor" class="play-icon"><path d="M8 5v14l11-7z"/></svg>
          <svg viewBox="0 0 24 24" fill="currentColor" class="pause-icon hidden"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button id="next-btn" class="control-btn" disabled>
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
      </div>

      <div class="player-progress">
        <span id="current-time" class="time-text">0:00</span>
        <input type="range" id="progress-slider" class="progress-slider" min="0" max="100" value="0">
        <span id="duration" class="time-text">0:00</span>
      </div>

      <div class="sync-status">
        <span id="sync-indicator" class="sync-indicator"></span>
        <span id="sync-text">Synced</span>
      </div>
    </footer>

    <div id="conflict-modal" class="modal hidden">
      <div class="modal-content">
        <h2>Playback Conflict</h2>
        <p>Another device is playing.</p>
        <p id="conflict-device"></p>
        <div class="modal-actions">
          <button id="cancel-conflict" class="btn btn-secondary">Cancel</button>
          <button id="takeover-btn" class="btn btn-primary">Take Over</button>
        </div>
      </div>
    </div>
  </div>

  <audio id="audio-player" preload="metadata"></audio>
  <script type="module" src="/main.js"></script>
</body>
</html>
