<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Podcast Sync</title>
  <link rel="stylesheet" href="/static/global.css">
</head>
<body>
  <div id="login-page">
    <div class="login-container">
      <h1>Podcast Sync</h1>
      <p class="login-subtitle">建立或加入帳號來同步播放進度</p>

      <button type="button" id="create-account-btn" class="btn btn-primary btn-block">
        Create New Account
      </button>

      <div class="divider">or</div>

      <input type="text" id="account-id-input" class="input" placeholder="Enter Account ID">
      <button type="button" id="join-account-btn" class="btn btn-secondary btn-block">
        Join Account
      </button>
    </div>
  </div>

  <script type="module" src="/static/login.js"></script>
</body>
</html>
